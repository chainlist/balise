<!doctype html>
<html lang="%lang%" dir="%dir%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Apply the persisted theme before first paint to avoid a light/dark
			// flash. The value mirrors the appearance setting (written by
			// themeService.applyTheme); on first launch it falls back to the OS
			// preference, matching the `system` default.
			(function () {
				try {
					var t = localStorage.getItem('balise_theme');
					var dark =
						t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
					if (dark) document.documentElement.classList.add('dark');
				} catch (e) {
					/* storage/matchMedia unavailable: theme still applies once JS loads */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
